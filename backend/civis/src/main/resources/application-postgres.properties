spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/civis}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
app.auth.expose-otp=${AUTH_EXPOSE_OTP:false}
app.admin.emails=${ADMIN_EMAILS:}
app.admin.mobiles=${ADMIN_MOBILES:}
app.sms.twilio.account-sid=${TWILIO_ACCOUNT_SID:}
app.sms.twilio.auth-token=${TWILIO_AUTH_TOKEN:}
app.sms.twilio.from-number=${TWILIO_FROM_NUMBER:}
app.auth.refresh-cookie-secure=${REFRESH_COOKIE_SECURE:true}
app.auth.refresh-cookie-same-site=${REFRESH_COOKIE_SAME_SITE:None}
