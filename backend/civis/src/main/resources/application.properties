spring.application.name=civis
server.servlet.context-path=/api
server.port=${PORT:8080}

# Default in-memory database for local tests & dev (H2)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.datasource.url=jdbc:h2:mem:civis;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver

# Use profile 'postgres' to run against PostgreSQL (production/local Postgres)
# spring.profiles.active=postgres

# Set to true only for local/demo troubleshooting.
app.auth.expose-otp=false
app.auth.jwt-secret=${JWT_SECRET:WmV0YVNlY3JldEtleUZvckNpdmlzQXBwSldUMjAyNl8zMl9CeXRlc19NaW5pbXVtIQ==}
app.auth.jwt-ttl-hours=${JWT_TTL_HOURS:24}
app.auth.refresh-token-ttl-days=${REFRESH_TOKEN_TTL_DAYS:30}
app.auth.refresh-cookie-secure=${REFRESH_COOKIE_SECURE:false}
app.auth.refresh-cookie-same-site=${REFRESH_COOKIE_SAME_SITE:Lax}
app.auth.refresh-cookie-domain=${REFRESH_COOKIE_DOMAIN:}
